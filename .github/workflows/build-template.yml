name: Build template

on:
  workflow_call:
    inputs:
      template:
        required: true
        type: string
      package:
        required: false
        type: string
        default: ""
      app:
        required: false
        type: string
        default: ""
      test_shell:
        required: false
        type: boolean
        default: false
      test_container:
        required: false
        type: boolean
        default: false
      test_vm:
        required: false
        type: boolean
        default: false
      test_forge_ui:
        required: false
        type: boolean
        default: false

jobs:
  build-template:
    name: Build ${{ inputs.template }} template
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0

      - uses: cachix/cachix-action@v16
        with:
          name: ngi-forge
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Create test directory
        run: mkdir -p /tmp/template-test

      - name: Initialize git repository
        working-directory: /tmp/template-test
        run: git init

      - name: Initialize ${{ inputs.template }} template
        working-directory: /tmp/template-test
        run: |
          nix flake init -t ${{ github.workspace }}#${{ inputs.template }}
          sed -i 's|ngi-forge.url = .*;|ngi-forge.url = "path:${{ github.workspace }}";|g' flake.nix
          git add ./*

      - name: Show flake info
        working-directory: /tmp/template-test
        run: |
          nix flake metadata
          nix flake show

      - name: Build package
        if: inputs.package != ''
        working-directory: /tmp/template-test
        run: nix build .#${{ inputs.package }} --accept-flake-config

      - name: Build app (shell)
        if: inputs.app != '' && inputs.test_shell
        working-directory: /tmp/template-test
        run: nix build .#${{ inputs.app }} --accept-flake-config

      - name: Build app (container)
        if: inputs.app != '' && inputs.test_container
        working-directory: /tmp/template-test
        run: nix build .#${{ inputs.app }}.container --accept-flake-config

      - name: Build app (VM)
        if: inputs.app != '' && inputs.test_vm
        working-directory: /tmp/template-test
        run: nix build .#${{ inputs.app }}.vm --accept-flake-config

      - name: Build _forge-ui
        if: inputs.test_forge_ui
        working-directory: /tmp/template-test
        run: |
          nix build .#_forge-ui --accept-flake-config
          test -f result/index.html
          test -f result/forge-config.json