name: Deploy UI

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as we
# want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install nix
        uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0

      - uses: cachix/cachix-action@v16
        with:
          name: loudgolem-nur-pkgs-0
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Encode version information
        run: |
          commit="$(git rev-parse HEAD~1)"
          commit=${commit:-master}
          sed -i "s/master/$commit/g" ui/src/Main/Config.elm

      - name: Configure the baseUrl
        run: |
          set -x
          repo_name="${{ github.event.repository.name }}"
          if [[ "$repo_name" == *.github.io ]]; then
            deploy_root="/"
          else
            deploy_root="/$repo_name/"
          fi
          sed -i "s|:baseUrl|$deploy_root|g" ui/src/Main/Route.elm
          sed -i "s|<base href=\"/\"|<base href=\"$deploy_root\"|g" ui/src/index.html

      - name: Build UI
        run: nix build .#_forge-ui --accept-flake-config

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "result"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
